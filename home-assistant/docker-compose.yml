services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    privileged: true
    environment:
      - TZ=America/Argentina/Buenos_Aires
    ports:
      - "8123:8123"
    volumes:
      - /var/lib/dokploy/homeassistant_config:/config
      - /etc/localtime:/etc/localtime:ro
      # Obliga a cargar estos YAML desde el repo (Dokploy: rutas relativas a esta carpeta).
      # Así sí aplica use_x_forwarded_for + trusted_proxies tras redeploy.
      # secrets.yaml y service_account.json (Google Assistant) NO van desde el repo:
      # colócalos en el volumen persistente: /config/ en el contenedor = /var/lib/dokploy/homeassistant_config/ en el VPS.
      # Ver GOOGLE-ASSISTANT-SERVICE-ACCOUNT.es.md
      - ./configuration.yaml:/config/configuration.yaml
      - ./automations.yaml:/config/automations.yaml
      - ./scripts.yaml:/config/scripts.yaml
      - ./scenes.yaml:/config/scenes.yaml
      - ./rest_commands.yaml:/config/rest_commands.yaml
      - ./themes:/config/themes
